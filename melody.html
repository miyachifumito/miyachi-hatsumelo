<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>発車メロディ一覧・実録</title>
    </head>
    <body style="text-align: center;">
        <h1>発車メロディ一覧</h1>
        <p>
            管理番号をクリックすることでページに飛べます<br>
            基本JR東日本管内でのみの反映を載せているのでその他路線（しなの鉄道線）などは載せておりません。
        </p>
        <table border="1" align="center">
            <tr style="background-color: lightgrey;">
                <th>管理番号</th>
                <th>曲名</th>
                <th>初回使用駅</th>
                <th>最終使用駅</th>
            </tr>
            <tr>
                <th style="width: 250px; color: white; background-color: darkblue;">周辺地域1番</th>
                <td style="width: 300px;">清流</td>
                <td style="width: 160px;">北千住</td>
                <td style="width: 160px;">勝浦</td>
            </tr>
            <tr>
                <th style="width: 250px; color: black; background-color: deepskyblue;">周辺地域2番</th>
                <td style="width: 300px;">雲を友として</td>
                <td style="width: 160px;">東京</td>
                <td style="width: 160px;">安房鴨川</td>
            </tr>
            <tr>
                <th style="width: 250px; color: white; background-color: blue;">周辺地域3番</th>
                <td style="width: 300px;">春</td>
                <td style="width: 160px;">(中央本線？)</td>
                <td style="width: 160px;"><span style="color: green;">使用中</span></td>
            </tr>
            <tr>
                <th style="width: 250px; color: black; background-color: orangered;">周辺地域4番</th>
                <td style="width: 300px;">せせらぎ</td>
                <td style="width: 160px;">立川</td>
                <td style="width: 160px;"><span style="color: green;">使用中</span></td>
            </tr>
            <tr>
                <th style="width: 250px; color: black; background-color: orange;">東日本地域5番</th>
                <td style="width: 300px;">Cielo Estrellado</td>
                <td style="width: 160px;">（東海道線？）</td>
                <td style="width: 160px;">大船</td>
            </tr>
            <tr>
                <th style="width: 250px; color: black; background-color: white;">東日本地域6番</th>
                <td style="width: 300px;">Gota del Vient</td>
                <td style="width: 160px;">（？）</td>
                <td style="width: 160px;">大船</td>
            </tr>
            <tr>
                <th style="width: 250px; color: black; background-color: mediumseagreen;">東日本地域7番</th>
                <td style="width: 300px;">Water Crown</td>
                <td style="width: 160px;">（くりこま高原？）</td>
                <td style="width: 160px;"><span style="color: green;">使用中</span></td>
            </tr>
        </table>
    </body>
</html>
